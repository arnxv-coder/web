<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System | Start Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;700&display=swap');

        :root {
            --bg: #050505;
            --system-blue: #3b82f6;
            --monarch-purple: #8b5cf6;
            --text-main: #f3f4f6;
            --text-dim: #6b7280;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, rgba(59, 130, 246, 0.05) 0%, transparent 70%);
        }

        .system-font {
            font-family: 'Share Tech Mono', monospace;
        }

        /* Live Clock */
        #clock {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Greeting / System Alert */
        .greeting {
            color: var(--system-blue);
            font-size: 1rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }

        /* Search Container */
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* Google Search Form */
        form {
            width: 100%;
            display: flex;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 1.2rem 1.5rem 1.2rem 3rem;
            font-size: 1.1rem;
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        input[type="text"]:focus {
            border-color: var(--monarch-purple);
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.2), inset 0 0 10px rgba(139, 92, 246, 0.1);
        }

        input[type="text"]::placeholder {
            color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
        }

        /* Search Icon (Simulated with a > bracket) */
        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--system-blue);
            font-size: 1.2rem;
            pointer-events: none;
        }

        input[type="text"]:focus ~ .search-icon {
            color: var(--monarch-purple);
        }

        /* Footer / Branding */
        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .arise {
            color: var(--monarch-purple);
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="clock">00:00</div>
    
    <div class="greeting system-font" id="greeting">[ System: Awaiting Command ]</div>

    <div class="search-container">
        <form action="https://www.google.com/search" method="get">
            <input type="text" name="q" placeholder="Enter query..." autocomplete="off" autofocus>
            <div class="search-icon system-font">></div>
        </form>
    </div>

    <div class="footer system-font">
        BUILT BY <span style="color: var(--text-main)">ARNXV</span> // <span style="color: var(--text-main)">KAGE LABS</span> // <span class="arise">ARISE.</span>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            
            // Format to 24-hour with leading zeros
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        
        // Update immediately, then every second
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
